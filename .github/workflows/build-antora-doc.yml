# Build Antora docs and publish to GitHub Pages on main
name: "Build Antora documentation"
on:
  workflow_dispatch:
  pull_request:
    types: [ opened, synchronize, reopened ]
  push:
    branches: [ main ]
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"
      - name: "Get Antora UI bundle"
        uses: actions/checkout@v4
        with:
          repository: KhronosGroup/antora-ui-khronos
          path: ./antora-ui-khronos
          ref: main
      - name: "Install npm"
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'
          cache: 'npm'
          cache-dependency-path: './antora-ui-khronos/package-lock.json'
      - name: "Install dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y asciidoctor
      - name: "Build UI bundle"
        working-directory: ./antora-ui-khronos
        run: |
          npx update-browserslist-db@latest
          ./node_modules/gulp/bin/gulp.js --version
          ./node_modules/gulp/bin/gulp.js bundle
      - name: "Copy UI bundle"
        run: cp ./antora-ui-khronos/build/ui-bundle.zip ./
      - name: "Build tutorial"
        run: |
          cd antora
          make
      - name: "Build Antora documentation"
        working-directory: ./
        run: npx antora antora-ci-playbook.yml --stacktrace
      - name: "Upload Pages artifact"
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/site

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: "Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4

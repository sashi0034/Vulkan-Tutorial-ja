# This Antora playbook is used by the CI to make sure the Antora build works
site:
  title: Khronos Vulkan チュートリアル
  url: https://sashi0034.github.io/Vulkan-Tutorial-ja
  start_page: tutorial::00_Introduction.adoc
content:
  sources:
  - url: ./
    branches: HEAD
    start_path: antora
ui:
  bundle:
    url: ui-bundle.zip
  supplemental_files:
  - path: ui.yml
    contents: |
      static_files: [ .nojekyll ]
  - path: .nojekyll
runtime:
  log:
    failure_level: warn

